<div class="forgot-pw-wrapper">

    <p-card class="forgot-pw-card">

        <img
                src="assets/images/logo_text.png"
                alt="App Icon"
                class="app-icon"
        />

        <h2>Forgot Password</h2>

        <h3>Thank you for your request</h3>

        <p>Should there exist a user with the given username, an email with instructions will be sent in the next minutes.</p>
        <p>If you still did not receive the email after 5 minutes, you can resend the email.</p>

        <!-- Buttons -->
        <div class="button-group">
            <p-button
                    label="Resend"
                    icon="pi pi-envelope"
                    (onClick)="onResend()"
                    [disabled]="!username"
                    styleClass="w-full p-mb-2">
            </p-button>
        </div>

    </p-card>
</div>
